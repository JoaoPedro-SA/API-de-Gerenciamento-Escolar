services:
  - type: web
    name: api-de-gerenciamento-escolar
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_DEBUG
        value: "false"
      - key: CORS_ALLOW_ORIGIN
        value: https://front-gestao-escolar.onrender.com
      - key: SQLITE_DB_PATH
        value: banco_de_dados.db
